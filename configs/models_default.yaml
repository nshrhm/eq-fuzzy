selection_date_utc: '2026-04-17'
selection_basis: 'OpenRouter official model pages plus paper-fit criteria: current
  availability, strong instruction following, vendor diversity, manageable 6-model
  panel for a 6-page conference paper.'
models:
- model_id: openai/gpt-5.4
  provider: openrouter
  default_include: true
  tier: frontier_reference
  release_date: '2026-03-05'
  context_tokens: 1050000
  input_cost_per_million_usd: 2.5
  output_cost_per_million_usd: 15.0
  reasoning_enabled: false
  rationale: Latest OpenAI frontier reference on OpenRouter; strong instruction following
    and long context.
- model_id: anthropic/claude-sonnet-4.5
  provider: openrouter
  default_include: true
  tier: frontier_reference
  release_date: '2025-09-29'
  context_tokens: 1000000
  input_cost_per_million_usd: 3.0
  output_cost_per_million_usd: 15.0
  reasoning_enabled: false
  rationale: Strong long-context Anthropic anchor with good prompt adherence for structured
    literary scoring.
- model_id: google/gemini-2.5-pro
  provider: openrouter
