selection_rules:
- Keep the core panel at six models so the paper remains legible within six IEEE pages.
- Use only non-preview, non-exp, non-free stable model IDs for the core paper panel.
- Prefer models that are contemporary on OpenRouter and plausibly strong on multilingual
  instruction-following.
- Disable visible reasoning traces when the provider allows it, to protect structured-output
  parsing and comparability.
reserve_models:
- model_id: openai/gpt-5-mini
  provider: openrouter
  use_case: budget substitute for GPT-5.4
- model_id: anthropic/claude-haiku-4.5
  provider: openrouter
  use_case: budget substitute for Claude Sonnet 4.5
- model_id: x-ai/grok-4.1-fast
  provider: openrouter
  use_case: lower-cost xAI substitute
- model_id: moonshotai/kimi-k2.5
  provider: openrouter
  use_case: optional extra Chinese-family comparator
